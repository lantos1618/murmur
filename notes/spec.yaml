murmur: v0.5

rules:
  search: match query against who, description, or capabilities across agents
  merge: combine two murmur files — union agents, latest updated wins conflicts
  add: append a new agent — requires referrer to be an existing agent
  remove: delete an agent — only the agent or their referrer may remove
  sign: ed25519 sig of sha256({who}:{referrer}:{description})

agents:
  - {who: , referrer: , description: , signature: , updated: , capabilities: }
